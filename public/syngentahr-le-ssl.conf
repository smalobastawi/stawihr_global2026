<IfModule mod_ssl.c>
<VirtualHost *:443>
        ServerName syngentahr.com

	ServerAdmin support@stawitech.com
	DocumentRoot /var/www/www/stawihr/clients/syngenta/public
	
	<Directory /var/www/www/stawihr/clients/syngenta>
         Options -Indexes +FollowSymLinks +MultiViews
            AllowOverride All
            Require all granted
    </Directory>
	
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined


SSLCertificateFile /etc/letsencrypt/live/syngentahr.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/syngentahr.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
