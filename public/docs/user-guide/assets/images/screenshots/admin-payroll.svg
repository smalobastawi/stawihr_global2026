  <text x="280" y="320" font-family="Segoe UI, sans-serif" font-size="11" fill="#384248">Step 3: Submit for approval</text>
  <text x="280" y="350" font-family="Segoe UI, sans-serif" font-size="11" fill="#384248">Step 4: Generate payment reports</text>
