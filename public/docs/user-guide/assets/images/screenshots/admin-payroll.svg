<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Payroll processing">
  <rect width="960" height="540" fill="#f4f6f8"/>
  <rect x="220" y="16" width="720" height="48" fill="#fff" stroke="#e3e8ee"/>
  <text x="240" y="46" font-family="Segoe UI, sans-serif" font-size="16" fill="#1a1f36" font-weight="600">Process Payroll</text>
  <rect x="240" y="80" width="680" height="420" rx="6" fill="#fff" stroke="#e3e8ee"/>
  <text x="260" y="115" font-family="Segoe UI, sans-serif" font-size="12" fill="#697386">Pay Period</text>
  <rect x="260" y="125" width="220" height="28" rx="4" fill="#f4f6f8" stroke="#e3e8ee"/>
  <rect x="260" y="170" width="140" height="36" rx="4" fill="#22c55e"/>
  <text x="295" y="193" font-family="Segoe UI, sans-serif" font-size="12" fill="#fff">Run Payroll</text>
  <rect x="260" y="230" width="640" height="200" rx="4" fill="#fafbfc" stroke="#e3e8ee"/>
  <text x="280" y="260" font-family="Segoe UI, sans-serif" font-size="11" fill="#384248">Step 1: Validate employee profiles</text>
