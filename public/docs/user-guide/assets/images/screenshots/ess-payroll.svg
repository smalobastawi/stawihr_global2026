<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="ESS Payroll payslip">
  <rect width="960" height="540" fill="#f4f6f8"/>
  <rect x="220" y="16" width="720" height="48" fill="#fff" stroke="#e3e8ee"/>
