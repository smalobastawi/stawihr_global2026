  <rect x="240" y="80" width="680" height="420" rx="6" fill="#fff" stroke="#e3e8ee"/>
  <text x="260" y="115" font-family="Segoe UI, sans-serif" font-size="12" fill="#697386">Select pay period</text>
  <rect x="260" y="125" width="200" height="28" rx="4" fill="#f4f6f8" stroke="#e3e8ee"/>
